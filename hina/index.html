*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg)) fixed;
  color:var(--ink);line-height:1.75;
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1040px;margin:0 auto;padding:40px 20px 96px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.home{font-size:.8rem;color:var(--sub);text-decoration:none;border:1px solid var(--line);
  padding:6px 12px;border-radius:999px}
.home:hover{border-color:var(--gold);color:var(--gold)}
.kicker{font-size:.78rem;letter-spacing:.28em;color:var(--peach);text-transform:uppercase;margin:0 0 6px}
h1{font-size:clamp(1.6rem,4vw,2.3rem);margin:0 0 6px;line-height:1.2}
h1 .accent{background:linear-gradient(90deg,var(--gold),var(--peach),var(--magenta));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.week{color:var(--sub);font-size:.95rem;margin:0 0 4px;font-variant-numeric:tabular-nums}
.lede{color:var(--sub);font-size:.9rem;max-width:60ch}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;margin-top:34px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.18)}
.card img{width:100%;height:auto;display:block}
.c-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px;min-width:0}
.c-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date{font-weight:800;font-size:1.15rem;font-variant-numeric:tabular-nums}
.date small{font-weight:600;color:var(--sub);font-size:.8rem;margin-left:2px}
.tag{font-size:.72rem;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:999px;
  background:var(--tag);color:var(--peach);border:1px solid var(--line)}
.theme{font-size:.85rem;color:var(--sub)}
.post{margin:0;padding:14px 16px;background:var(--post);border:1px solid var(--line);
  border-radius:12px;white-space:pre-wrap;word-break:break-word;font-size:.92rem}
footer{margin-top:56px;text-align:center;color:var(--sub);font-size:.82rem;
  border-top:1px solid var(--line);padding-top:22px}
footer a{color:var(--gold);text-decoration:none}
@media (max-width:560px){.grid{grid-template-columns:1fr}}

.wcard{text-decoration:none;background:var(--card);border:1px solid var(--line);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.18);transition:.15s}
.wcard:hover{border-color:var(--gold);transform:translateY(-2px)}
